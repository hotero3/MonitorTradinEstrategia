<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotero Pro Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <div id="delta-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 9px; color: #b2b5be; font-weight: bold;">BTC DELTA</span>
        <span id="delta_val" style="font-family: monospace; font-weight: bold; font-size: 12px;">--</span>
        <span id="long-valor" style="font-family: monospace; color: #00ff88; font-size: 11px;">--</span>
        <span id="short-valor" style="font-family: monospace; color: #ff4d4d; font-size: 11px;">--</span>
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 5px;">
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="alert_th" value="100" style="width: 45px; background: #000; color: #00ff88; border: 1px solid #444; font-size: 10px; padding: 2px;">
            <span style="font-size: 9px; color: #888;">M ALERT THRESHOLD</span>
        </div>
        <button id="mute_btn" title="Mute/Unmute Alert">🔊</button>
    </div>
  </div>

 <div id="trade-control" style="background: #1e222d; padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; border-left: 4px solid #2196f3;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <span style="font-size: 9px; color: #787b86; font-weight: bold;">BINANCE BTCUSDT</span>
        <span id="live-price" style="font-family: monospace; font-weight: bold; font-size: 13px; color: #fff;">0.00</span>
    </div>
    <div style="display: flex; gap: 4px;">
        <button id="btn-long" style="flex: 1; background: #00ff88; color: #000; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; font-size: 9px; padding: 3px;">LONG</button>
        <button id="btn-short" style="flex: 1; background: #ff4d4d; color: #fff; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; font-size: 9px; padding: 3px;">SHORT</button>
        <button id="btn-clear" style="background: #333; color: #eee; border: none; border-radius: 2px; padding: 3px 6px; cursor: pointer;">×</button>
    </div>
    <div id="pnl-display" style="display:none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; text-align: center;">
    <div id="entry-info" style="font-size: 10px; margin-bottom: 2px;"></div>
    
    <div id="pnl-val" style="font-size: 20px; font-weight: bold; margin-bottom: 6px;">0.00%</div>
    
    <div id="picos-container" style="font-size: 9px; display: flex; flex-direction: column; gap: 2px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;">
        <div style="display: flex; justify-content: space-between;">
            <span style="color: #787b86;">Pico Máximo:</span>
            <span id="max-val" style="color: #00ff88; font-family: monospace;">--</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span style="color: #787b86;">Pico Mínimo:</span>
            <span id="min-val" style="color: #ff4d4d; font-family: monospace;">--</span>
        </div>
    </div>
</div>
</div>

  <div id="dashboard">
    <div id="main-signal">CONECTANDO...</div>
    <div class="mini-stats">
      <span id="trend-tag">Trend: --</span> | 
      <span id="strength-tag">ADX: --</span> | 
    </div>

    <div class="chart-wrapper">
      <div class="chart-label">MACD HISTOGRAM</div>
      <canvas id="macdChart"></canvas>
    </div>

    <div class="chart-wrapper">
      <div class="chart-label">ADX & DMI</div>
      <canvas id="adxChart"></canvas>
    </div>
  </div>

  <div class="header">
    <span>HOTERO PRO V2.1</span>
    <span id="status" style="font-size: 8px;">●</span>
  </div>
  
  <table class="data-table">
    <tr>
      <td style="color: #787b86;">ADX / D+ / D-</td>
      <td id="adx_vals" class="val">--</td>
    </tr>
    <tr>
      <td style="color: #787b86;">HIST / MACD / SIG</td>
      <td id="macd_full_vals" class="val">--</td>
    </tr>
  </table>

 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="popup.js"></script>
</body>
</html>
