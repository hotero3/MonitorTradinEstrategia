<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hotero Pro Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #131722;
      color: #d1d4dc;
      margin: 0;
      padding: 10px;
      width: 380px;
      display: flex;
      flex-direction: column;
      overflow-x: hidden; /* Evita scroll horizontal */
    }
    
    /* Panel de Alertas CoinGlass (Delta) */
    #delta-container {
      background: #1e222d;
      padding: 8px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      border-left: 4px solid #f0b90b;
      transition: box-shadow 0.3s ease-in-out;
}

#main-signal {
    transition: all 0.3s ease;
}

/* Efecto de borde cuando el MACD está por cruzar */
.warning-border {
    border: 2px solid #f0b90b !important;
    box-shadow: 0 0 10px rgba(240, 185, 11, 0.3);
}

    /* Panel de Señal Hotero */
    #main-signal {
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 1.1em;
      border-radius: 6px;
      margin-bottom: 5px;
      background: #333;
      color: white;
      text-transform: uppercase;
    }
    .mini-stats {
      font-size: 10px;
      text-align: center;
      margin-bottom: 8px;
      color: #b2b5be;
    }
    .text-green { color: #00ff88; font-weight: bold; }
    .text-red { color: #ff4d4d; font-weight: bold; }

    /* Gráficos Optimizado Altura */
    .chart-wrapper {
      height: 120px; 
      margin-bottom: 8px;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 5px;
      position: relative;
    }
    .chart-label {
      position: absolute;
      top: 4px;
      left: 8px;
      font-size: 9px;
      color: #787b86;
      z-index: 10;
      pointer-events: none;
      text-transform: uppercase;
    }

    /* Tabla de Datos inferior */
    .header {
      font-size: 10px;
      font-weight: bold;
      border-top: 1px solid #363a45;
      padding-top: 5px;
      display: flex;
      justify-content: space-between;
      color: #787b86;
    }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 3px; }
    .data-table td { padding: 2px 0; border-bottom: 1px solid #2a2e39; font-size: 10px; }
    .val { text-align: right; font-weight: bold; font-family: monospace; color: #fff; }

    /* Estilo Botón y Inputs */
    #mute_btn {
      background: transparent;
      border: 1px solid #444;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 5px;
    }
    #alert_th:focus { outline: 1px solid #00ff88; }
    .blink-border {
    animation: alert-border 1s infinite;
}

@keyframes alert-border {
    0% { border-color: #f0b90b; box-shadow: 0 0 5px #f0b90b; }
    50% { border-color: transparent; box-shadow: none; }
    100% { border-color: #f0b90b; box-shadow: 0 0 5px #f0b90b; }
}
  </style>
</head>
<body>

  <div id="delta-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 9px; color: #b2b5be; font-weight: bold;">BTC DELTA</span>
        <span id="delta_val" style="font-family: monospace; font-weight: bold; font-size: 12px;">--</span>
        <span id="long-valor" style="font-family: monospace; color: #00ff88; font-size: 11px;">--</span>
        <span id="short-valor" style="font-family: monospace; color: #ff4d4d; font-size: 11px;">--</span>
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 5px;">
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="alert_th" value="100" style="width: 45px; background: #000; color: #00ff88; border: 1px solid #444; font-size: 10px; padding: 2px;">
            <span style="font-size: 9px; color: #888;">M ALERT THRESHOLD</span>
        </div>
        <button id="mute_btn" title="Mute/Unmute Alert">🔊</button>
    </div>
  </div>

 <div id="trade-control" style="background: #1e222d; padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; border-left: 4px solid #2196f3;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <span style="font-size: 9px; color: #787b86; font-weight: bold;">BINANCE BTCUSDT</span>
        <span id="live-price" style="font-family: monospace; font-weight: bold; font-size: 13px; color: #fff;">0.00</span>
    </div>
    <div style="display: flex; gap: 4px;">
        <button id="btn-long" style="flex: 1; background: #00ff88; color: #000; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; font-size: 9px; padding: 3px;">LONG</button>
        <button id="btn-short" style="flex: 1; background: #ff4d4d; color: #fff; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; font-size: 9px; padding: 3px;">SHORT</button>
        <button id="btn-clear" style="background: #333; color: #eee; border: none; border-radius: 2px; padding: 3px 6px; cursor: pointer;">×</button>
    </div>
    <div id="pnl-display" style="display: none; margin-top: 6px; border-top: 1px solid #363a45; padding-top: 4px; font-size: 10px;">
        <span id="entry-info" style="color: #b2b5be;"></span>
        <span id="pnl-val" style="float: right; font-family: monospace; font-weight: bold;">0.00%</span>
    </div>
</div>

  <div id="dashboard">
    <div id="main-signal">CONECTANDO...</div>
    <div class="mini-stats">
      <span id="trend-tag">Trend: --</span> | 
      <span id="strength-tag">ADX: --</span> | 
    </div>

    <div class="chart-wrapper">
      <div class="chart-label">MACD HISTOGRAM</div>
      <canvas id="macdChart"></canvas>
    </div>

    <div class="chart-wrapper">
      <div class="chart-label">ADX & DMI</div>
      <canvas id="adxChart"></canvas>
    </div>
  </div>

  <div class="header">
    <span>HOTERO PRO V2.1</span>
    <span id="status" style="font-size: 8px;">●</span>
  </div>
  
  <table class="data-table">
    <tr>
      <td style="color: #787b86;">ADX / D+ / D-</td>
      <td id="adx_vals" class="val">--</td>
    </tr>
    <tr>
      <td style="color: #787b86;">HIST / MACD / SIG</td>
      <td id="macd_full_vals" class="val">--</td>
    </tr>
  </table>

  <script src="chart.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
